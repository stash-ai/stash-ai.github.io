<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Watch JEEnius think — step-by-step JEE reasoning</title>
<meta name="description" content="Pick an answer, then watch JEEnius reason it out — step by step, the way a great tutor would. A calm look at how the AI thinks, not just the answer.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%231B3B36'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' fill='white' text-anchor='middle'%3EJ%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F6F4EF; --surface:#FFFFFF; --surface-2:#FBFAF5;
  --ink:#0F201D; --ink-soft:#4A5A55; --ink-faint:#7E8C87;
  --green:#1B3B36; --green-hover:#244A44;
  --gold:#FFD700; --gold-ink:#8A6A00; --gold-soft:#FBEFC2; --gold-line:#EEDFA0;
  --sage:#DCEFD8; --mint:#EAF3EF; --line:#E8E3D8; --line-strong:#D9D3C5;
  --shadow-sm:0 2px 10px -4px rgba(15,32,29,.14);
  --shadow:0 18px 44px -22px rgba(15,32,29,.22);
  --radius:16px; --radius-lg:24px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--canvas); color:var(--ink);
  font-family:'Plus Jakarta Sans',system-ui,sans-serif; line-height:1.65;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow-x:hidden;
  background-image:radial-gradient(rgba(15,32,29,.045) 1px, transparent 1.5px);
  background-size:26px 26px; background-position:-13px -13px;
}
::selection{background:var(--gold); color:#0F201D}
a{color:inherit; text-decoration:none}
i{font-style:italic}
:focus-visible{outline:2px solid var(--green); outline-offset:3px; border-radius:6px}

/* ---------- chrome ---------- */
.chrome{position:sticky; top:0; z-index:60;
  background:color-mix(in srgb, var(--canvas) 84%, transparent);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  border-bottom:1px solid transparent; transition:border-color .3s var(--ease)}
.chrome.scrolled{border-bottom-color:var(--line)}
.chrome-inner{max-width:1120px; margin:0 auto; padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:14px}
.brand{display:inline-flex; align-items:center; gap:10px}
.brand-j{width:32px; height:32px; border-radius:9px; background:var(--green); color:#fff;
  display:grid; place-items:center; font-family:'Fraunces',Georgia,serif; font-weight:600;
  font-size:18px; box-shadow:var(--shadow-sm); flex:none}
.brand-name{font-weight:800; font-size:19px; letter-spacing:-.02em; color:var(--ink)}
.chrome-right{display:inline-flex; align-items:center; gap:14px}
.lab-link{color:var(--ink-soft); font-weight:600; font-size:14.5px; transition:color .2s var(--ease)}
.lab-link:hover{color:var(--ink)}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-weight:700; font-size:15px; line-height:1; padding:13px 22px; border-radius:999px;
  border:1px solid transparent; cursor:pointer; white-space:nowrap;
  transition:transform .25s var(--ease), background-color .25s var(--ease), box-shadow .25s var(--ease)}
.btn-primary{background:var(--green); color:#fff; box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--green-hover); transform:translateY(-2px); box-shadow:var(--shadow)}

/* ---------- stage / intro ---------- */
.stage{max-width:730px; margin:0 auto; padding:52px 20px 80px}
.intro{text-align:center; margin-bottom:30px}
.eyebrow{display:inline-flex; align-items:center; gap:9px; font-size:12px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; color:var(--gold-ink)}
.eyebrow::before{content:""; width:18px; height:2px; border-radius:2px; background:var(--gold)}
.h1{font-family:'Fraunces',Georgia,serif; font-optical-sizing:auto; font-weight:500;
  font-size:clamp(31px,6vw,52px); line-height:1.08; letter-spacing:-.02em; color:var(--ink);
  margin:16px 0 0}
.h1 .soft{color:var(--ink-soft)}
.sub{color:var(--ink-soft); font-size:clamp(15.5px,2vw,18px); max-width:52ch; margin:16px auto 0}

/* ---------- theater card ---------- */
.theater{position:relative; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:clamp(20px,3.4vw,34px)}
.theater-top{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px}
.subject{display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:700;
  letter-spacing:.05em; text-transform:uppercase; color:var(--green);
  background:var(--sage); border-radius:999px; padding:6px 13px}
.subject::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--green); flex:none}
.qcount{font-size:13px; font-weight:600; color:var(--ink-faint); letter-spacing:.04em;
  font-variant-numeric:tabular-nums}
.qcount b{color:var(--ink-soft); font-weight:700}

.question{font-family:'Fraunces',Georgia,serif; font-optical-sizing:auto; font-weight:500;
  font-size:clamp(20px,3vw,27px); line-height:1.32; letter-spacing:-.01em; color:var(--ink); margin:0}
.qgiven{color:var(--ink-soft); font-size:.82em}

/* ---------- diagram ---------- */
.diagram-slot{margin:20px 0 4px}
.diagram-slot[hidden]{display:none}
.diagram-frame{background:var(--surface-2); border:1px solid var(--line); border-radius:16px;
  padding:14px 12px 10px}
.diag{width:100%; max-width:340px; height:auto; display:block; margin:0 auto}
.diag .ground{stroke:var(--ink-faint); stroke-width:1.4}
.diag .arc{fill:none; stroke:var(--green); stroke-width:2.4; stroke-linecap:round;
  transition:stroke-dashoffset .85s var(--ease)}
.diag .pt{fill:var(--green)}
.diag .varrow{stroke:var(--gold-ink); stroke-width:2}
.diag .vhead{fill:var(--gold-ink)}
.diag .angle{fill:none; stroke:var(--ink-faint); stroke-width:1.4}
.diag .comp{stroke:var(--green); stroke-width:1.6; stroke-dasharray:3 3}
.diag .comphead{fill:var(--green)}
.diag .hgt{stroke:var(--gold-ink); stroke-width:1.6; stroke-dasharray:4 4}
.diag .lbl{font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:700; fill:var(--ink-soft)}
.diag .lbl.gold{fill:var(--gold-ink)}
.diag .lbl.sm{font-size:10px}
.diag .grp{opacity:0; transition:opacity .55s var(--ease)}
.diag .grp.in{opacity:1}
.diag.nodash .arc,.diag.nodash .grp{transition:none}

/* ---------- options ---------- */
.options{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px}
.opt{display:flex; align-items:center; gap:12px; width:100%; min-height:54px; text-align:left;
  padding:12px 15px; border:1px solid var(--line); border-radius:14px; background:var(--surface);
  color:var(--ink); font-family:inherit; font-size:15.5px; font-weight:600; cursor:pointer;
  transition:transform .18s var(--ease), border-color .2s var(--ease), background-color .2s var(--ease), box-shadow .2s var(--ease)}
.opt:hover{border-color:var(--line-strong); background:var(--surface-2); transform:translateY(-1px)}
.opt .lt{width:27px; height:27px; flex:none; border-radius:8px; background:var(--surface-2);
  color:var(--ink-soft); display:grid; place-items:center; font-size:13px; font-weight:800;
  transition:background-color .2s var(--ease), color .2s var(--ease)}
.opt .ob{flex:1}
.opt.picked{border-color:var(--green); background:var(--mint); box-shadow:inset 0 0 0 1px var(--green)}
.opt.picked .lt{background:var(--green); color:#fff}
.opt.correct{border-color:var(--green); background:var(--mint); box-shadow:inset 0 0 0 1px var(--green)}
.opt.correct .lt{background:var(--green); color:#fff}
.opt.locked{cursor:default}
.opt.locked:hover{transform:none; background:var(--surface); border-color:var(--line)}
.opt.locked.picked:hover,.opt.locked.correct:hover{background:var(--mint); border-color:var(--green)}
.opt .tag{margin-left:auto; display:inline-flex; align-items:center; gap:5px; font-size:11px;
  font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-faint)}
.opt.correct .tag{color:var(--green)}
.opt .tick{width:17px; height:17px; color:var(--green)}

/* ---------- action + reason ---------- */
.action:empty{display:none}
.action{margin-top:22px}
.watch{width:100%; padding:15px 24px; font-size:15.5px}
.watch .arr{font-weight:600; transition:transform .25s var(--ease)}
.watch:hover .arr{transform:translateX(3px)}

.reason{margin-top:6px}
.reason:empty{display:none}
.thinking{display:inline-flex; align-items:center; gap:12px; padding:20px 2px 8px;
  opacity:0; transform:translateY(4px)}
.thinking.in{opacity:1; transform:none; transition:opacity .4s var(--ease), transform .4s var(--ease)}
.tlabel{color:var(--ink-faint); font-size:14px; font-weight:600}
.dots{display:inline-flex; gap:5px}
.dots i{width:7px; height:7px; border-radius:50%; background:var(--green); opacity:.24;
  animation:dotp 1.15s var(--ease) infinite}
.dots i:nth-child(2){animation-delay:.15s}
.dots i:nth-child(3){animation-delay:.3s}
@keyframes dotp{0%,70%,100%{opacity:.24; transform:translateY(0)}35%{opacity:1; transform:translateY(-3px)}}

.steps{margin-top:16px; display:flex; flex-direction:column; gap:12px}
.stepcard{border:1px solid var(--line); border-radius:16px; background:var(--surface);
  box-shadow:var(--shadow-sm); overflow:hidden;
  opacity:0; transform:translateY(10px)}
.stepcard.in{opacity:1; transform:none; transition:opacity .5s var(--ease), transform .5s var(--ease)}
.stephead{display:flex; align-items:center; gap:12px; padding:15px 18px}
.stepnum{width:28px; height:28px; flex:none; border-radius:9px; background:var(--green); color:#fff;
  display:grid; place-items:center; font-size:13px; font-weight:800; box-shadow:var(--shadow-sm)}
.steptitle{font-weight:700; font-size:15.5px; color:var(--ink); letter-spacing:-.01em}
.stepbody{padding:15px 18px 18px; border-top:1px solid var(--line)}
.step-prose{margin:0; color:var(--ink-soft); font-size:15px; line-height:1.62}
.step-prose .w{display:inline-block; opacity:0; transform:translateY(.3em)}
.step-prose.play .w{opacity:1; transform:none;
  transition:opacity .4s var(--ease), transform .4s var(--ease);
  transition-delay:calc(var(--wi,0) * 22ms)}
.mathrow{margin-top:14px; display:flex; flex-direction:column; gap:8px;
  opacity:0; transform:translateY(6px)}
.mathrow.in{opacity:1; transform:none; transition:opacity .5s var(--ease), transform .5s var(--ease)}
.mathrow:empty{display:none}
.stepcard.instant,.stepcard.instant *{transition:none !important; animation:none !important}

/* ---------- math typography ---------- */
.mwrap{max-width:100%; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
  padding:2px 0}
.m{display:inline-block; white-space:nowrap; font-variant-numeric:tabular-nums;
  letter-spacing:.012em; line-height:1.5}
.mathrow .m{background:var(--surface-2); border:1px solid var(--line); border-radius:12px;
  padding:11px 15px; color:var(--green); font-size:16px; font-weight:500}
.m sup{font-size:.7em; vertical-align:.55em; line-height:0}
.m sub{font-size:.7em; vertical-align:-.25em; line-height:0}
.frac{display:inline-flex; flex-direction:column; vertical-align:middle; text-align:center;
  line-height:1.02; margin:0 .16em}
.frac>span:first-child{border-bottom:1.4px solid currentColor; padding:0 .38em .08em}
.frac>span:last-child{padding:.08em .38em 0}
.intg,.evb{display:inline-flex; align-items:center; vertical-align:middle}
.sgn{font-family:'Fraunces',Georgia,serif; font-size:1.5em; line-height:0; font-weight:400}
.lim{display:inline-flex; flex-direction:column; font-size:.58em; line-height:1.08;
  text-align:center; margin:0 .12em}

/* ---------- answer ---------- */
.answercard{display:flex; align-items:flex-start; gap:15px; margin-top:18px;
  background:var(--gold-soft); border:1px solid var(--gold-line); border-radius:18px;
  padding:18px 20px; opacity:0; transform:translateY(10px)}
.answercard.in{opacity:1; transform:none; transition:opacity .5s var(--ease), transform .5s var(--ease)}
.answercard.instant,.answercard.instant *{transition:none !important; animation:none !important}
.answercard.pulse{animation:goldpulse 1.5s var(--ease) .12s 1}
@keyframes goldpulse{0%{box-shadow:0 0 0 0 rgba(255,215,0,0)}28%{box-shadow:0 0 0 7px rgba(255,215,0,.16)}100%{box-shadow:0 0 0 0 rgba(255,215,0,0)}}
.ansmark{width:34px; height:34px; flex:none; border-radius:50%; background:var(--green);
  display:grid; place-items:center; box-shadow:var(--shadow-sm)}
.ansmark svg{width:19px; height:19px}
.ansmain{min-width:0; flex:1}
.anslabel{font-size:11.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
  color:var(--gold-ink)}
.ansvalue{margin-top:3px; color:var(--green); font-size:23px; font-weight:600}
.ansverdict{margin-top:8px; font-size:15px; font-weight:600; line-height:1.5}
.ansverdict.good{color:var(--green)}
.ansverdict.kind{color:var(--ink-soft)}
.ansverdict b{color:var(--ink); font-weight:800}

/* ---------- controls ---------- */
.controls{display:flex; align-items:center; justify-content:space-between; gap:14px;
  margin-top:22px; padding-top:18px; border-top:1px solid var(--line)}
.try{display:inline-flex; align-items:center; gap:8px; font-family:inherit; font-weight:700;
  font-size:14.5px; padding:11px 18px; min-height:44px; border-radius:999px;
  border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); cursor:pointer;
  transition:border-color .2s var(--ease), background-color .2s var(--ease), transform .2s var(--ease)}
.try:hover{border-color:var(--green); background:var(--surface-2); transform:translateY(-1px)}
.try[hidden]{display:none}
.try .arr{transition:transform .25s var(--ease)}
.try:hover .arr{transform:translateX(3px)}
.skip{display:inline-flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
  font-size:13.5px; font-weight:600; color:var(--ink-soft); min-height:44px}
.skip input{position:absolute; opacity:0; width:1px; height:1px}
.switch{width:38px; height:22px; flex:none; border-radius:999px; background:var(--line-strong);
  position:relative; transition:background-color .25s var(--ease)}
.switch::after{content:""; position:absolute; top:2px; left:2px; width:18px; height:18px;
  border-radius:50%; background:#fff; box-shadow:var(--shadow-sm); transition:transform .25s var(--ease)}
.skip input:checked + .switch{background:var(--green)}
.skip input:checked + .switch::after{transform:translateX(16px)}
.skip input:focus-visible + .switch{outline:2px solid var(--green); outline-offset:2px}

.footnote{text-align:center; color:var(--ink-faint); font-size:13.5px; margin:26px auto 0; max-width:46ch}
.footnote a{color:var(--gold-ink); font-weight:700}
.footnote a:hover{text-decoration:underline}
.noscript{margin-top:20px; padding:16px 18px; border:1px dashed var(--line-strong);
  border-radius:14px; color:var(--ink-soft); text-align:center}

/* ---------- responsive ---------- */
@media (max-width:560px){
  .options{grid-template-columns:1fr}
  .brand-name{display:none}
  .chrome-inner{padding:10px 16px}
  .btn{font-size:13.5px; padding:12px 16px}
  .lab-link{font-size:13px}
  .stage{padding:38px 16px 70px}
}

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; animation-iteration-count:1 !important;
    transition-duration:.001ms !important}
  .step-prose .w{opacity:1 !important; transform:none !important}
  .stepcard,.mathrow,.answercard,.thinking{opacity:1 !important; transform:none !important}
  .btn-primary:hover,.opt:hover,.try:hover{transform:none !important}
}
</style>
</head>
<body>
<header class="chrome" id="chrome">
  <div class="chrome-inner">
    <a class="brand" href="../index.html" aria-label="JEEnius home">
      <span class="brand-j" aria-hidden="true">J</span>
      <span class="brand-name">JEEnius</span>
    </a>
    <div class="chrome-right">
      <a class="lab-link" href="index.html">← Lab</a>
      <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.stash.jeenius&hl=en_IN">Start practising free</a>
    </div>
  </div>
</header>

<main class="stage">
  <div class="intro">
    <span class="eyebrow">JEEnius · reasoning</span>
    <h1 class="h1">See how it thinks — <span class="soft">not just the answer.</span></h1>
    <p class="sub">Pick an answer, then watch JEEnius reason it out — step by step, the way a great tutor would.</p>
  </div>

  <section class="theater" aria-label="Reasoning theater">
    <div class="theater-top">
      <span class="subject" id="subjectChip">JEE Main · Maths</span>
      <div class="qcount"><b id="qNow">1</b> / <span id="qTotal">3</span></div>
    </div>

    <p class="question" id="questionText"></p>
    <div class="diagram-slot" id="diagramSlot" hidden></div>

    <div class="options" id="options" role="group" aria-label="Choose an answer"></div>

    <div class="action" id="actionZone"></div>

    <div class="reason" id="reasonZone" aria-live="polite"></div>

    <div class="controls">
      <button class="try" id="tryBtn" hidden>Try another <span class="arr">→</span></button>
      <label class="skip">
        <input type="checkbox" id="skipToggle">
        <span class="switch" aria-hidden="true"></span>
        <span>Skip animation</span>
      </label>
    </div>

    <noscript><div class="noscript">Enable JavaScript to watch JEEnius reason through each question, step by step.</div></noscript>
  </section>

  <p class="footnote">Worked solutions use standard JEE methods. <a href="index.html">Back to the lab →</a></p>
</main>

<script>
(function(){
  "use strict";

  /* ---- math builders ---- */
  var V   = function(s){ return '<i>'+s+'</i>'; };
  var F   = function(n,d){ return '<span class="frac"><span>'+n+'</span><span>'+d+'</span></span>'; };
  var sup = function(s){ return '<sup>'+s+'</sup>'; };
  var sub = function(s){ return '<sub>'+s+'</sub>'; };
  var INTG = '<span class="intg"><span class="sgn">∫</span><span class="lim"><span>1</span><span>0</span></span></span>';
  var SGN  = '<span class="sgn">∫</span>';

  /* ---- projectile diagram (Q2) ---- */
  var DIAGRAM =
    '<div class="diagram-frame">'+
    '<svg class="diag" viewBox="0 0 340 190" role="img" aria-label="A ball launched at 30 degrees above the ground; a dashed vertical line marks its maximum height h.">'+
      '<line class="ground" x1="24" y1="158" x2="316" y2="158"/>'+
      '<path class="arc" d="M48 158 Q174 -22 300 158"/>'+
      '<path class="angle" d="M78 158 A30 30 0 0 0 74 143"/>'+
      '<text class="lbl sm" x="83" y="152">30°</text>'+
      '<line class="varrow" x1="48" y1="158" x2="100" y2="128"/>'+
      '<polygon class="vhead" points="100,128 94,136 90,129"/>'+
      '<text class="lbl gold" x="104" y="122">20 m/s</text>'+
      '<circle class="pt" cx="48" cy="158" r="3.4"/>'+
      '<g class="grp" id="dgComp">'+
        '<line class="comp" x1="48" y1="158" x2="48" y2="126"/>'+
        '<polygon class="comphead" points="48,123 44,131 52,131"/>'+
        '<text class="lbl sm" x="6" y="140">uᵧ = 10</text>'+
      '</g>'+
      '<g class="grp" id="dgHeight">'+
        '<line class="hgt" x1="174" y1="70" x2="174" y2="158"/>'+
        '<text class="lbl gold" x="180" y="116">h = 5 m</text>'+
      '</g>'+
    '</svg></div>';

  /* ---- content ---- */
  var QUESTIONS = [
    {
      subject:'JEE Main · Maths',
      question:'Evaluate <span class="m">'+INTG+' '+V('x')+sup('2')+' d'+V('x')+'</span>',
      options:[
        {letter:'A', html:F('1','2'), plain:'1/2'},
        {letter:'B', html:F('1','3'), plain:'1/3', correct:true},
        {letter:'C', html:'1',        plain:'1'},
        {letter:'D', html:F('2','3'), plain:'2/3'}
      ],
      steps:[
        {
          title:'Use the power rule',
          prose:'For any power of x, integrating follows one clean rule: lift the exponent by one, then divide by that new exponent.',
          math:[
            SGN+' '+V('x')+sup(V('n'))+' d'+V('x')+' = '+F(V('x')+sup(V('n')+'+1'), V('n')+' + 1'),
            V('n')+' = 2 ⇒ antiderivative = '+F(V('x')+sup('3'),'3')
          ]
        },
        {
          title:'Apply the limits 0 → 1',
          prose:'Now plug in the two limits: evaluate the antiderivative at the top, then subtract its value at the bottom.',
          math:[
            '<span class="evb">[ '+F(V('x')+sup('3'),'3')+' ]<span class="lim"><span>1</span><span>0</span></span></span> = '+F('1'+sup('3'),'3')+' − 0 = '+F('1','3')
          ]
        }
      ],
      answer:F('1','3'), answerPlain:'1/3'
    },
    {
      subject:'JEE Main · Physics',
      question:'A ball is thrown at 20 m/s at 30° above the horizontal. What is its maximum height? <span class="qgiven">(g = 10 m/s'+sup('2')+')</span>',
      diagram:DIAGRAM,
      options:[
        {letter:'A', html:'2.5 m', plain:'2.5 m'},
        {letter:'B', html:'5 m',   plain:'5 m', correct:true},
        {letter:'C', html:'10 m',  plain:'10 m'},
        {letter:'D', html:'20 m',  plain:'20 m'}
      ],
      steps:[
        {
          title:'Vertical component of velocity',
          prose:'Only the vertical part of the throw fights gravity, so split the launch velocity into its horizontal and vertical pieces.',
          math:[
            V('u')+sub('y')+' = '+V('u')+' · sin θ = 20 · sin 30° = 20 × 0.5 = 10 m/s'
          ]
        },
        {
          title:'At the top, vertical velocity is zero',
          prose:'At the highest point the ball has stopped rising, so its vertical velocity is momentarily zero. Use the motion equation below.',
          math:[
            V('v')+sup('2')+' = '+V('u')+sub('y')+sup('2')+' − 2'+V('g')+V('H'),
            '0 = 10'+sup('2')+' − 2 · 10 · '+V('H')
          ]
        },
        {
          title:'Solve for the height',
          prose:'Rearrange to isolate H, the maximum height.',
          math:[
            V('H')+' = '+F('100','20')+' = 5 m'
          ]
        }
      ],
      answer:'5 m', answerPlain:'5 m'
    },
    {
      subject:'JEE Main · Physics',
      question:'A non-conducting ring (charge '+V('q')+', mass '+V('m')+', radius '+V('R')+') sits in an axial magnetic field switched from 0 to '+V('B')+'. Find its final angular velocity ω.',
      options:[
        {letter:'A', html:F(V('q')+V('B'), V('m')),        plain:'qB/m'},
        {letter:'B', html:F(V('q')+V('B'), '2'+V('m')),    plain:'qB/2m', correct:true},
        {letter:'C', html:F('2'+V('q')+V('B'), V('m')),    plain:'2qB/m'},
        {letter:'D', html:F(V('q')+V('B')+V('R'), '2'+V('m')), plain:'qBR/2m'}
      ],
      steps:[
        {
          title:'A changing field creates a circular E-field',
          prose:'When the magnetic field changes in time, it wraps an electric field around the ring. This is Faraday’s law of induction.',
          math:[
            V('E')+' = '+F(V('R'),'2')+' · '+F('d'+V('B'),'d'+V('t'))
          ]
        },
        {
          title:'That field torques the charge',
          prose:'The induced field pushes on the ring’s charge, giving a torque. Adding that torque over the whole ramp gives the angular impulse.',
          math:[
            'τ = '+V('q')+V('E')+V('R')+' = '+F(V('q')+V('R')+sup('2'),'2')+' · '+F('d'+V('B'),'d'+V('t')),
            '∫ τ d'+V('t')+' = '+F(V('q')+V('R')+sup('2'),'2')+' · Δ'+V('B')+'    (with '+V('I')+' = '+V('m')+V('R')+sup('2')+')'
          ]
        },
        {
          title:'Angular impulse = I · ω',
          prose:'Angular impulse equals the change in angular momentum. Set them equal and solve for the final angular velocity.',
          math:[
            F(V('q')+V('R')+sup('2'),'2')+' · '+V('B')+' = '+V('m')+V('R')+sup('2')+' · ω ⇒ ω = '+F(V('q')+V('B'),'2'+V('m'))
          ]
        }
      ],
      answer:'ω = '+F(V('q')+V('B'),'2'+V('m')), answerPlain:'qB/2m'
    }
  ];

  var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  var TICK  = '<svg class="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

  /* ---- refs ---- */
  var $ = function(id){ return document.getElementById(id); };
  var subjectChip = $('subjectChip'), qNow = $('qNow'), qTotal = $('qTotal');
  var questionText = $('questionText'), diagramSlot = $('diagramSlot');
  var optionsEl = $('options'), actionEl = $('actionZone'), reasonEl = $('reasonZone');
  var tryBtn = $('tryBtn'), skipToggle = $('skipToggle'), chrome = $('chrome');

  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- state ---- */
  var qi = 0;                // current question index
  var phase = 'picking';     // picking | ready | revealing | done
  var picked = null;         // letter
  var skip = false;          // skip-animation preference
  var runId = 0;             // cancels stale async reveals
  var stepsWrap = null;      // current .steps container
  var dg = null;             // diagram refs

  function Q(){ return QUESTIONS[qi]; }
  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
  function raf2(fn){ requestAnimationFrame(function(){ requestAnimationFrame(fn); }); }
  function correctOf(q){
    for(var i=0;i<q.options.length;i++){ if(q.options[i].correct) return q.options[i]; }
    return q.options[0];
  }

  /* ---- render a question (full reset) ---- */
  function renderQuestion(){
    runId++;                       // cancel any running reveal
    phase = 'picking'; picked = null; dg = null; stepsWrap = null;
    var q = Q();
    subjectChip.textContent = q.subject;
    qNow.textContent = (qi+1);
    questionText.innerHTML = q.question;

    if(q.diagram){
      diagramSlot.hidden = false;
      diagramSlot.innerHTML = q.diagram;
      setupDiagram();
    } else {
      diagramSlot.hidden = true;
      diagramSlot.innerHTML = '';
    }

    var html = '';
    for(var i=0;i<q.options.length;i++){
      var o = q.options[i];
      html += '<button class="opt" type="button" data-letter="'+o.letter+'" aria-pressed="false">'+
                '<span class="lt">'+o.letter+'</span><span class="ob">'+o.html+'</span></button>';
    }
    optionsEl.innerHTML = html;
    var btns = optionsEl.children;
    for(var j=0;j<btns.length;j++){
      (function(b){ b.addEventListener('click', function(){ pick(b.getAttribute('data-letter')); }); })(btns[j]);
    }

    actionEl.innerHTML = '';
    reasonEl.innerHTML = '';
    tryBtn.hidden = true;
  }

  function setupDiagram(){
    var svg = diagramSlot.querySelector('.diag');
    if(!svg) return;
    var path = svg.querySelector('.arc');
    var len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    dg = { svg:svg, path:path, len:len,
           comp:svg.querySelector('#dgComp'), height:svg.querySelector('#dgHeight') };
  }

  /* ---- pick an option ---- */
  function pick(letter){
    if(phase !== 'picking' && phase !== 'ready') return;   // locked once solving
    picked = letter; phase = 'ready';
    var btns = optionsEl.children;
    for(var i=0;i<btns.length;i++){
      var b = btns[i], on = b.getAttribute('data-letter') === letter;
      b.classList.toggle('picked', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    }
    if(!document.getElementById('watchBtn')) renderAction();
  }

  function renderAction(){
    actionEl.innerHTML = '<button class="btn btn-primary watch" type="button" id="watchBtn">'+
      'Watch JEEnius solve it <span class="arr">→</span></button>';
    var b = $('watchBtn');
    b.style.opacity = '0'; b.style.transform = 'translateY(8px)';
    b.addEventListener('click', onWatch);
    raf2(function(){
      b.style.transition = 'opacity .45s var(--ease), transform .45s var(--ease)';
      b.style.opacity = '1'; b.style.transform = 'none';
    });
  }

  function onWatch(){
    if(phase !== 'ready') return;
    if(REDUCED || skip){ flushSolved(); }
    else { runSolve(); }
  }

  /* ---- animated reveal ---- */
  function thinkingEl(){
    var d = document.createElement('div');
    d.className = 'thinking';
    d.innerHTML = '<span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>'+
                  '<span class="tlabel">JEEnius is thinking…</span>';
    return d;
  }

  function words(text){
    var parts = text.split(/\s+/), out = [];
    for(var i=0;i<parts.length;i++){
      out.push('<span class="w" style="--wi:'+i+'">'+parts[i]+'</span>');
    }
    return out.join(' ');
  }

  function buildStep(i){
    var s = Q().steps[i];
    var math = '';
    for(var k=0;k<s.math.length;k++){
      math += '<div class="mwrap"><span class="m">'+s.math[k]+'</span></div>';
    }
    var card = document.createElement('div');
    card.className = 'stepcard';
    card.innerHTML =
      '<div class="stephead"><span class="stepnum">'+(i+1)+'</span>'+
        '<span class="steptitle">'+s.title+'</span></div>'+
      '<div class="stepbody"><p class="step-prose">'+words(s.prose)+'</p>'+
        '<div class="mathrow">'+math+'</div></div>';
    return card;
  }

  function buildAnswer(){
    var q = Q(), c = correctOf(q), right = (picked === c.letter);
    var verdict = right
      ? 'Nice — that’s right.'
      : 'Not quite — here’s why the answer is <b>'+c.letter+'</b> ('+q.answerPlain+').';
    var el = document.createElement('div');
    el.className = 'answercard';
    el.innerHTML =
      '<span class="ansmark" aria-hidden="true">'+CHECK+'</span>'+
      '<div class="ansmain">'+
        '<div class="anslabel">Answer</div>'+
        '<div class="ansvalue m">'+q.answer+'</div>'+
        '<div class="ansverdict '+(right?'good':'kind')+'">'+verdict+'</div>'+
      '</div>';
    return el;
  }

  function diagramPhase(i, instant){
    if(!dg) return;
    if(instant) dg.svg.classList.add('nodash');
    var fr = [0.46, 0.80, 1][i];
    if(fr === undefined) fr = 1;
    dg.path.style.strokeDashoffset = dg.len * (1 - fr);
    if(i >= 0) dg.comp.classList.add('in');
    if(i >= 2) dg.height.classList.add('in');
  }

  function revealStep(i, my){
    var card = buildStep(i);
    stepsWrap.appendChild(card);
    var prose = card.querySelector('.step-prose');
    var mathrow = card.querySelector('.mathrow');
    raf2(function(){
      card.classList.add('in');
      prose.classList.add('play');
    });
    diagramPhase(i, false);
    var wc = Q().steps[i].prose.split(/\s+/).length;
    var proseMs = 170 + wc*20 + 190;
    return sleep(proseMs).then(function(){
      if(my !== runId) return;
      mathrow.classList.add('in');
      return sleep(430);
    });
  }

  function runSolve(){
    var my = ++runId;
    phase = 'revealing';
    actionEl.innerHTML = '';
    reasonEl.innerHTML = '';
    var think = thinkingEl();
    reasonEl.appendChild(think);
    requestAnimationFrame(function(){ think.classList.add('in'); });

    sleep(760).then(function(){
      if(my !== runId) return;
      think.remove();
      stepsWrap = document.createElement('div');
      stepsWrap.className = 'steps';
      reasonEl.appendChild(stepsWrap);
      var chain = Promise.resolve();
      Q().steps.forEach(function(_, i){
        chain = chain.then(function(){
          if(my !== runId) return;
          return revealStep(i, my);
        });
      });
      chain.then(function(){
        if(my !== runId) return;
        return sleep(180);
      }).then(function(){
        if(my !== runId) return;
        var ans = buildAnswer();
        reasonEl.appendChild(ans);
        raf2(function(){ ans.classList.add('in'); ans.classList.add('pulse'); });
        finishSolved();
      });
    });
  }

  /* ---- instant reveal (skip / reduced-motion) ---- */
  function flushSolved(){
    runId++;                       // cancel any animated run
    phase = 'revealing';
    actionEl.innerHTML = '';
    reasonEl.innerHTML = '';
    stepsWrap = document.createElement('div');
    stepsWrap.className = 'steps';
    reasonEl.appendChild(stepsWrap);
    Q().steps.forEach(function(_, i){
      var card = buildStep(i);
      card.classList.add('instant', 'in');
      stepsWrap.appendChild(card);
      card.querySelector('.step-prose').classList.add('play');
      var mr = card.querySelector('.mathrow'); if(mr) mr.classList.add('in');
      diagramPhase(i, true);
    });
    var ans = buildAnswer();
    ans.classList.add('instant', 'in');
    reasonEl.appendChild(ans);
    finishSolved();
  }

  function finishSolved(){
    phase = 'done';
    var q = Q(), c = correctOf(q), btns = optionsEl.children;
    for(var i=0;i<btns.length;i++){
      var b = btns[i], L = b.getAttribute('data-letter');
      b.classList.add('locked');
      if(L === c.letter){
        b.classList.add('correct');
        addTag(b, 'answer', true);
      } else if(L === picked){
        addTag(b, 'your pick', false);
      }
    }
    tryBtn.hidden = false;
  }

  function addTag(btn, label, withTick){
    if(btn.querySelector('.tag')) return;
    var span = document.createElement('span');
    span.className = 'tag';
    span.innerHTML = (withTick ? TICK : '') + '<span>'+label+'</span>';
    btn.appendChild(span);
  }

  /* ---- controls ---- */
  tryBtn.addEventListener('click', function(){
    qi = (qi + 1) % QUESTIONS.length;
    renderQuestion();
  });

  skipToggle.addEventListener('change', function(){
    skip = skipToggle.checked;
    if(skip && phase === 'revealing'){ flushSolved(); }
  });

  window.addEventListener('scroll', function(){
    chrome.classList.toggle('scrolled', window.scrollY > 4);
  }, {passive:true});

  /* ---- init ---- */
  qTotal.textContent = QUESTIONS.length;
  renderQuestion();
})();
</script>
</body>
</html>
